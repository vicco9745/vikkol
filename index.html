<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finance News</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>

/* link के सारे default color हटाओ */
.back-btn,
.back-btn:link,
.back-btn:visited,
.back-btn:hover,
.back-btn:active {
  text-decoration: none;
  color: white !important;
}

/* icon को force white करो */
.arrow-icon {
  color: white !important;
  font-size: 28px;
}
    




*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  font-family: Arial, sans-serif;
  background:#0d0d0d;
  color:#fff;
  min-height:100vh;
}

/* Header */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  background:#1a1a1a;
  border-bottom:1px solid #2a2a2a;
  width:100%;
}

/* Search */
.search-container{
  padding:12px;
  width:100%;
}

.search-wrapper{
  position:relative;
  width:100%;
}

.search-box{
  width:100%;
  padding:13px 50px 13px 45px;
  border-radius:30px;
  border:none;
  outline:none;
  background:#1e2633;
  color:#fff;
  font-size:15px;
}

.search-box::placeholder{
  color:#888;
}

.icon{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
  cursor:pointer;
  font-size:22px;
  user-select:none;
}

.search-icon{
  left:13px;
}

.mic-icon{
  right:13px;
  transition:color 0.2s;
}

.mic-icon.listening{
  color:#ff4444;
  animation: pulse 0.8s infinite;
}

@keyframes pulse{
  0%  { opacity:1; }
  50% { opacity:0.4; }
  100%{ opacity:1; }
}

/* Cards */
#news{
  padding:10px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  width:100%;
  background:#1e1e1e;
  padding:12px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

.card h3{
  font-size:15px;
  margin-bottom:8px;
  word-break:break-word;
  overflow-wrap:break-word;
  line-height:1.4;
}

.card p{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
  word-break:break-word;
  overflow-wrap:break-word;
  line-height:1.4;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:10px;
  display:block;
}

.card a{
  color:#4ea8ff;
  font-size:13px;
  font-weight:bold;
  text-decoration:none;
}

/* Voice Status Toast */
#voiceStatus{
  display:none;
  text-align:center;
  font-size:13px;
  color:#4ea8ff;
  padding:6px;
  margin: 0 12px 4px;
  background:#1a2433;
  border-radius:8px;
}

#loading{
  text-align:center;
  padding:40px;
  color:#888;
}

</style>
</head>

<body>

<a href="giy.html" class="back-btn">
  <span class="material-symbols-outlined arrow-icon">
    arrow_back
  </span>
</a>


<div class="header">Finance News</div>

<!-- SEARCH -->
<div class="search-container">
  <div class="search-wrapper">

    <span class="material-symbols-outlined icon search-icon">search</span>

    <input 
      type="text" 
      id="search"
      class="search-box"
      placeholder="Search news..."
      oninput="searchNews()"
    >


<span class="material-symbols-outlined icon mic-icon" id="micBtn" onclick="startVoice()">mic</span>




  </div>
</div>

<!-- Voice toast -->


<div id="news">
  <div id="loading">Loading...</div>
</div>

<script>


let allArticles = [];

fetch('finance.json')
.then(r => r.json())
.then(data => {
  allArticles = data.articles;
  showNews(allArticles);
});

function showNews(data){
  if(data.length === 0){
    document.getElementById("news").innerHTML = `<div id="loading">Koi news nahi mili 😕</div>`;
    return;
  }

  let html = "";
  data.forEach(a => {
    const img = a.urlToImage 
      ? `<img src="${a.urlToImage}" loading="lazy" onerror="this.style.display='none'">`
      : "";

    html += `
    <div class="card">
      <h3>${a.title}</h3>
      <p>${a.description || ""}</p>
      ${img}
      <a href="${a.url}" target="_blank">Read More →</a>
    </div>`;
  });

  document.getElementById("news").innerHTML = html;
}

function searchNews(){
  const input = document.getElementById("search").value.toLowerCase().trim();
  const filtered = allArticles.filter(a =>
    a.title.toLowerCase().includes(input) ||
    (a.description || "").toLowerCase().includes(input)
  );
  showNews(filtered);
}

/* Voice Search */
function startVoice(){

  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    alert("Aapka browser voice search support nahi karta. Chrome use karein.");
    return;
  }

  const micBtn    = document.getElementById("micBtn");
  const statusDiv = document.getElementById("voiceStatus");
  const searchBox = document.getElementById("search");

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  micBtn.classList.add("listening");
  micBtn.textContent = "mic_off";
  statusDiv.style.display = "block";

  recognition.start();

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    searchBox.value = text;
    searchNews();
  };

  recognition.onerror = function(e){
    console.error("Voice error:", e.error);
    if(e.error === "not-allowed"){
      alert("Mic permission do pehle — browser settings mein allow karein.");
    }
  };

  recognition.onend = function(){
    micBtn.classList.remove("listening");
    micBtn.textContent = "mic";
    statusDiv.style.display = "none";
  };

}

</script>

</body>
<script>
function startVoice() {

  if (!('webkitSpeechRecognition' in window)) {
    alert("Chrome use करो");
    return;
  }

  const mic = document.getElementById("micBtn");
  const searchBox = document.querySelector("input");

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "hi-IN";

  recognition.start();

  mic.style.color = "red";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript.toLowerCase();

    searchBox.value = text;

    // 👉 English + इंग्लिश दोनों match
    handleSearch(text);

    mic.style.color = "white";
  };

  recognition.onerror = function(event) {
    mic.style.color = "white";
    alert("Error: " + event.error);
  };

  recognition.onend = function() {
    mic.style.color = "white";
  };
}


// 🔍 SEARCH SYSTEM (FIXED)
function handleSearch(text) {

  if (text.includes("finance") || text.includes("फाइनेंस")) {
    document.getElementById("result").innerHTML = "📈 Finance News दिखा रहा हूँ";
  }

  else if (text.includes("bank") || text.includes("बैंक")) {
    document.getElementById("result").innerHTML = "🏦 Bank News दिखा रहा हूँ";
  }

  else if (text.includes("video") || text.includes("वीडियो")) {
    document.getElementById("result").innerHTML = "🎥 Video दिखा रहा हूँ";
  }

  else {
    document.getElementById("result").innerHTML = "❌ Result नहीं मिला";
  }

}
</script>
</script>


</html>
